<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Welcome Back Login | Octo-mood Tracker</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
       <header>
            <div class="logo">
                <img src="images/octomood.png" alt="Octo Mood Logo">
                <a href="#">Octo-Mood Tracker</a>
            </div>
            <input type="checkbox"  id="menu-toggle" class="menu-toggle">
            <label for="menu-toggle" class="menubtn">
            <span></span>
            <span></span>             
            <span></span>
            </label>
            <nav>
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
                <a href="register.html">Sign Up</a>
                <a href="aboutus.html">About Us</a>
                <div class="dropdown">
                    <a href="#">ToolBox</a>
                    <div class="dropdown-menu">
                        <a href="calendar.html">Calendar</a>
                        <a href="journal.html">Journal</a>
                    </div>
                </div>
            </nav>
        </header>

        <main id="loginPage">
            <section class="loginContainer">
                <h1 id="loginTitle">Welcome Back</h1>
                <p id="loginText">Log in to continue tracking your mood.
                </p>
                <form id="loginForm">
                    <label for="loginUser">Username</label>
                    <input type="text" id="loginUser" name="loginUser" required>
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="loginPassword" required>
                    <button type="submit" id="loginButton">Login</button>
                </form>
                <p id="registerRedirect">
                    Don’t have an account?
                    <a href="register.html">Sign Up</a>
                </p>
            </section>
        </main>
        
        <footer>
            <a href="index.html" class="logo">
                <img src="images/octomood.png" alt="Octo Mood Logo">
                <span>Octo-Mood Tracker</span>
            </a>
            <div class="footerhead2">
                <h2>ToolBox</h2>
                <a href="calendar.html">Calendar</a>
                <a href="journal.html">Journal</a>
            </div>
            <div class="footerhead3">
                <h2>Get in touch with us!</h2>
                <input type="email" placeholder="Please enter your email here." id="footeremail"> 
                <input type="submit" value="Submit" id="footemailbtn"> 
            </div>
            <hr>
            <p>© 2026 Octo-Mood</p>
        </footer>            
    </body>

</html>
