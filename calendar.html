    <head>
        <meta charset="UTF-8">
        <title>Calendar | Octo-mood Tracker</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
       <header>
            <a href="index.html" class="logo">
                <img src="images/octomood.png" alt="Octo Mood Logo">
                <span>Octo-Mood Tracker</span>
            </a>
            <input type="checkbox"  id="menu-toggle" class="menu-toggle">
            <label for="menu-toggle" class="menubtn">

            <span></span>

                        <a href="journal.html">Journal</a>
                    </div>
                </div>

        </header>
    
        <main id="calendarPage">
            <section class="calendarContainer">
                <div class="calendarHeader">
                    <button id="prevbutton">&#10094;</button>
                    <h1 id="monthYear"></h1>
                    <button id="nextbutton">&#10095;</button>
                </div>
                <div class="calendarDays">
                    <div>Sun</div>
                    <div>Mon</div>
                    <div>Tue</div>
                    <div>Wed</div>
                    <div>Thu</div>
                    <div>Fri</div>
                    <div>Sat</div>
                </div>
                <div id="calendarDates"></div>
            </section>
            
        </main>

        <footer>
            <div class="footerhead1">
                <h2>Account Options</h2>
                <a href="register.html">Sign Up</a>

            <div class="footerhead2">

                <a href="calendar.html">Calendar</a>
                <a href="journal.html">Journal</a>
            </div>
            <div class="footerhead3">

                <input type="email" placeholder="Please enter your email here." id="footeremail"> 
                <input type="submit" value="Submit" id="footemailbtn"> 
            </div>
            <hr>
            <p>© 2026 Octo-Mood</p>
