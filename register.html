<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Register | Octo-mood Tracker</title>
        <link rel="stylesheet" href="style.css">
    </head>
    
    <body>
       <header>
            <a href="index.html" class="logo">
                <img src="images/octomood.png" alt="Octo Mood Logo">
                <span>Octo-Mood Tracker</span>
            </a>
            <input type="checkbox"  id="menu-toggle" class="menu-toggle">
            <label for="menu-toggle" class="menubtn">
            <span></span>
            <span></span>             
            <span></span>
            </label>
            <nav>
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
                <a href="register.html">Sign Up</a>
                <a href="aboutus.html">About Us</a>
                <div class="dropdown">
                    <a href="#">ToolBox</a>
                    <div class="dropdown-menu">
                        <a href="calendar.html">Calendar</a>
                        <a href="journal.html">Journal</a>
                    </div>
                </div>
            </nav>
        </header>
                <main id="registerPage">
            <section class="registerContainer">
                <h1 id="registerTitle">Create Account</h1>
                <p id="registerText">
                Start your mood tracking journey today.</p>
                <form id="registerForm">
                    <label for="registerUser">Username</label>
                    <input type="text" id="registerUser" name="registerUser" required>
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" name="registerEmail" required>
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" name="registerPassword" required>
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                    <button type="submit" id="registerButton">Create Account</button>
                </form>
                <p id="loginRedirect">
                Already have an account?<a href="login.html">Login</a>
                </p>
            </section>
        </main>
        
        <footer>
            <div class="footerhead1">
                <h2>Account Options</h2>
                <a href="register.html">Sign Up</a>
                <a href="login.html">Login</a>
            </div>
            <div class="footerhead2">
                <h2>ToolBox</h2>
                <a href="calendar.html">Calendar</a>
                <a href="journal.html">Journal</a>
            </div>
            <div class="footerhead3">
                <h2>Get in touch with us!</h2>
                <input type="email" placeholder="Please enter your email here." id="footeremail"> 
                <input type="submit" value="Submit" id="footemailbtn"> 
            </div>
            <hr>
            <p>© 2026 Octo-Mood</p>
        </footer>        
    </body>

</html>
